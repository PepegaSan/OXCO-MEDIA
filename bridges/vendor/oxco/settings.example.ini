[SETTINGS]
language = en
buffer_seconds = 2.0
pixel_noise_threshold = 15
changed_pixels_threshold = 200
# If more pixels than this differ, the frame is ignored as "difference" (0 = off). Example: global rescale/KI.
changed_pixels_max_threshold = 0
enable_ffmpeg_export = 0
ffmpeg_export_target = both
ffmpeg_encoder = libx264
# 1 = FFmpeg and DaVinci never reuse the same output basename: append _b…_n…_p… from filter; if file exists, _2…_20.
export_avoid_overwrite = 0
enable_fullcheck_edl = 0
enable_autodelete_edl = 1
enable_davinci_export = 0
davinci_render_timeout_seconds = 1800
davinci_render_preset = AutoCutPreset
davinci_startup_wait_seconds = 20
# How long compare waits for scriptapp("Resolve") after analysis (Studio only; slow PCs may need more).
davinci_scriptapp_retry_attempts = 60
davinci_scriptapp_retry_delay_seconds = 3

[PATHS]
# DaVinci Resolve Studio — „Modules“-Ordner (leer = Oxco nutzt OS-Standard beim ersten Start).
# Typical Windows: C:/ProgramData/Blackmagic Design/DaVinci Resolve/Support/Developer/Scripting/Modules
# Typical macOS: /Library/Application Support/Blackmagic Design/DaVinci Resolve/Developer/Scripting/Modules
davinci_api_path =
# Optional: Resolve binary — compare can auto-start Resolve (Windows). Typical:
# C:/Program Files/Blackmagic Design/DaVinci Resolve/Resolve.exe
davinci_exe_path =
final_export_dir =

[GUI]
last_manual_source =
last_manual_df =
ui_theme = dark
